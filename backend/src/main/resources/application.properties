spring.application.name=personal-finance-tracker

server.port=${PORT:8080}

# ---------- MySQL Database ----------
# Locally these fall back to your local MySQL. In production, Render sets these
# as environment variables and they override the defaults automatically.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/finance_tracker?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:YOUR_MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---------- JPA / Hibernate ----------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---------- Frontend URL (for CORS) ----------
# Locally this is Angular's dev server. In production, set FRONTEND_URL to your Netlify URL.
frontend.url=${FRONTEND_URL:http://localhost:4200}

# ---------- JWT ----------
jwt.secret=${JWT_SECRET:change-this-to-your-own-long-random-secret-string-please}
jwt.expiration.ms=86400000

# ---------- Email (used for "forgot password") ----------
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-16-character-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
